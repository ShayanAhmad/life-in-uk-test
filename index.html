<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .nav-links {
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            text-decoration: none;
            color: white;
            border-radius: 6px;
            transition: opacity 0.2s;
        }
        .btn-exams { background-color: #007bff; }
        .btn-study { background-color: #28a745; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Study Repository</h1>
        <p>Select a page to get started:</p>
        
        <div class="nav-links">
            <a href="exams.html" class="btn btn-exams">Go to Exams</a>
            <a href="study.html" class="btn btn-study">Go to Study Material</a>
        </div>
    </div>

</body>
</html>
